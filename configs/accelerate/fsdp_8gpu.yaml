# accelerate launch config for the two trainers on one 8-GPU node (PLAN.md §2:
# bf16 + FSDP full fine-tuning; ~130 GB optimizer states shard to ~16 GB/GPU).
compute_environment: LOCAL_MACHINE
distributed_type: FSDP
mixed_precision: bf16
num_machines: 1
num_processes: 8
fsdp_config:
  fsdp_version: 2
  fsdp_auto_wrap_policy: TRANSFORMER_BASED_WRAP
  fsdp_reshard_after_forward: true
  fsdp_state_dict_type: FULL_STATE_DICT
  fsdp_cpu_ram_efficient_loading: true
  fsdp_activation_checkpointing: false  # trainers call gradient_checkpointing_enable
downcast_bf16: 'no'
machine_rank: 0
main_training_function: main
rdzv_backend: static
same_network: true
use_cpu: false
